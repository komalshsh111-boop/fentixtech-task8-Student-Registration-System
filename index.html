<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

  <div class="text-center mb-4">
    <h1 class="fw-bold">🎓 Student Registration System</h1>
    <p class="text-muted">Fill the form below to register a student</p>
  </div>

  <div class="card shadow-sm p-4 mb-5 form-card">
    <form id="registrationForm" novalidate>
      <input type="hidden" id="editIndex" value="-1">

      <div class="row g-3">

        <div class="col-md-6">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" placeholder="e.g. Komal Fatima">
          <div class="invalid-feedback" id="fullNameError"></div>
        </div>

        <div class="col-md-6">
          <label for="email" class="form-label">Email Address</label>
          <input type="text" class="form-control" id="email" placeholder="e.g. komal@example.com">
          <div class="invalid-feedback" id="emailError"></div>
        </div>

        <div class="col-md-6">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="text" class="form-control" id="phone" placeholder="e.g. 03001234567">
          <div class="invalid-feedback" id="phoneError"></div>
        </div>

        <div class="col-md-6">
          <label for="course" class="form-label">Course Name</label>
          <input type="text" class="form-control" id="course" placeholder="e.g. Web Development">
          <div class="invalid-feedback" id="courseError"></div>
        </div>

      </div>

      <div class="mt-4 text-end">
        <button type="button" class="btn btn-secondary me-2" id="resetBtn">Reset</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Register Student</button>
      </div>
    </form>
  </div>

  <div class="card shadow-sm p-4">
    <h4 class="mb-3">📋 Registered Students</h4>
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
        </tbody>
      </table>
    </div>
    <p id="noRecordsMsg" class="text-muted text-center mb-0">No students registered yet.</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
